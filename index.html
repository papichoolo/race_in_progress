<!DOCTYPE html>
<html lang="en">
    <head>
        <title>race_in_progress</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
        <style>
            body {
                color: #333;
                margin: 0;
                overflow: hidden;
                font-family: Monospace;
                background-color: #000;
            }
            html, body { height: 100%; }
            canvas { touch-action: none; display: block; }

            #info {
                position: absolute;
                top: 50px;
                right: 10px;
                padding: 6px 10px;
                box-sizing: border-box;
                text-align: right;
                color: #fff;
                background: rgba(0,0,0,0.45);
                border-radius: 4px;
                font-size: 12px;
                z-index: 1;
                pointer-events: none;
                max-width: calc(100vw - 20px);
            }
            #info p { margin: 2px 0; }

            #volume {
                position: absolute;
                top: 50px;
                left: 10px;
                padding: 6px 10px;
                box-sizing: border-box;
                color: #fff;
                background: rgba(0,0,0,0.45);
                border-radius: 4px;
                font-size: 11px;
                letter-spacing: 1.2px;
                z-index: 1;
                display: flex;
                align-items: center;
                gap: 8px;
                pointer-events: auto;
            }
            #volume label { opacity: 0.85; }
            #volume input[type=range] {
                -webkit-appearance: none;
                appearance: none;
                width: 110px;
                height: 4px;
                background: rgba(255,255,255,0.25);
                border-radius: 2px;
                outline: none;
                cursor: pointer;
            }
            #volume input[type=range]::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: #FFCB47;
                cursor: pointer;
            }
            #volume input[type=range]::-moz-range-thumb {
                width: 12px;
                height: 12px;
                border: none;
                border-radius: 50%;
                background: #FFCB47;
                cursor: pointer;
            }
            #volume span { min-width: 28px; text-align: right; opacity: 0.85; }

            /* ── Custom scrollbars on the overlay panels ──────────────────
               The stats-for-nerds panel scrolls; default OS scrollbars look
               jarring on the dark glass theme. Target elements with
               overflow-y:auto inside our overlays.                          */
            *::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            *::-webkit-scrollbar-track {
                background: rgba(255,255,255,0.04);
                border-radius: 3px;
            }
            *::-webkit-scrollbar-thumb {
                background: rgba(255,203,71,0.35);
                border-radius: 3px;
                transition: background 120ms;
            }
            *::-webkit-scrollbar-thumb:hover {
                background: rgba(255,203,71,0.65);
            }
            *::-webkit-scrollbar-corner { background: transparent; }
            /* Firefox */
            * { scrollbar-width: thin; scrollbar-color: rgba(255,203,71,0.35) rgba(255,255,255,0.04); }

            /* ── Responsive overlays ─────────────────────────────────────────
               JS creates the speedometer / stats panels with inline styles,
               so the media queries below have to use !important to override
               them on smaller viewports. Numbers here are tuned to keep all
               overlays readable and non-overlapping down to 320px wide.    */

            @media (max-width: 900px) {
                #info { font-size: 11px; padding: 5px 8px; }
                #info p { margin: 1px 0; }
            }

            @media (max-width: 600px) {
                #info { font-size: 10px; padding: 4px 7px; max-width: 60vw; }

                /* speedometer (centred panel) — shrink + drop padding */
                body > div[style*="translateX(-50%)"] {
                    padding: 6px 10px !important;
                    gap: 10px !important;
                    bottom: 10px !important;
                    max-width: calc(100vw - 16px) !important;
                    box-sizing: border-box !important;
                }
                /* speedometer's children: gear digit, speed number, mode chip */
                body > div[style*="translateX(-50%)"] > div:first-child {
                    font-size: 28px !important;
                    min-width: 32px !important;
                }
                body > div[style*="translateX(-50%)"] > div:nth-child(2) > div:first-child {
                    font-size: 24px !important;
                }
                body > div[style*="translateX(-50%)"] > div:nth-child(2) > div:nth-child(3) {
                    width: 90px !important;
                }

                /* stats-for-nerds panel + toggle — top slightly less, narrower */
                body > div[style*="overflow-y:auto"] {
                    min-width: 240px !important;
                    max-width: calc(100vw - 20px) !important;
                    max-height: 65vh !important;
                    font-size: 10px !important;
                }
                body > div[title="F3"] { top: 175px !important; font-size: 10px !important; }
            }

            @media (max-width: 420px) {
                /* very small screens: pos-coords pill takes too much horizontal
                   space next to speedometer — push it above the speedometer */
                body > div[style*="bottom:10px"][style*="right:10px"] {
                    bottom: 90px !important;
                    font-size: 10px !important;
                    min-width: 0 !important;
                }
                body > div[style*="bottom:10px"][style*="left:10px"] {
                    bottom: 90px !important;
                    font-size: 10px !important;
                }
                #info { font-size: 9px; max-width: 65vw; }
            }

            @media (max-height: 500px) {
                /* short / landscape phones */
                #info { top: 6px; right: 6px; padding: 3px 6px; font-size: 10px; }
                #info p { margin: 0; line-height: 1.4; }
            }
        </style>
    </head>
    <body>
        <div id="volume">
            <label for="volumeSlider">VOL</label>
            <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.4">
            <span id="volumeValue">40</span>
        </div>

        <div id="info">
            <p>W / ↑ · throttle</p>
            <p>Space · brake</p>
            <p>S / ↓ · brake · hold = reverse</p>
            <p>A D / ← → · steer</p>
            <p>E · handbrake</p>
            <p>M · auto / manual</p>
            <p>Q · cycle car</p>
            <p>L⇧ · upshift  ·  L⌃ · downshift</p>
            <p>R · reset</p>
            <p>C · cycle camera (chase / free / pov)</p>
        </div>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
